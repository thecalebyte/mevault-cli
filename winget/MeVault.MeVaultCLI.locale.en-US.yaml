ShortDescription: Local-first secret manager that keeps credentials away from AI coding agents
Description: |-
  MeVault keeps your development secrets away from AI coding agents using Windows named
  pipes and kernel-level process identity. Secrets are never placed in environment variables.
  Each pipe request is verified against a hardcoded always-deny list for known AI agent
  executables, a configurable allow-list, and eight kernel-level identity checks before
  any value is returned. Supports lazy per-secret decryption, Windows Job Objects for
  child process lifecycle management, and an admin-controlled system policy file that
  agents cannot override.
